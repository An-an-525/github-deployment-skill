<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Pulse - AI 趋势雷达</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="AI Pulse - 实时追踪 AI 领域最前沿动态，聚合 GitHub、HackerNews、ArXiv、ProductHunt 等多源数据">
<meta property="og:title" content="AI Pulse - AI 趋势雷达">
<meta property="og:description" content="实时追踪 AI 领域最前沿动态">
<meta property="og:image" content="favicon.svg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AI Pulse - AI 趋势雷达">
<meta name="twitter:description" content="实时追踪 AI 领域最前沿动态">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Markdown 渲染与代码高亮 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0EB;--card:#FFFFFF;--accent:#C96442;--accent-light:#E8956E;
  --accent-bg:rgba(201,100,66,0.08);--text:#1A1612;--text-secondary:#6B5E54;
  --text-tertiary:#9B8E84;--border:#E8E0D8;--shadow:0 1px 3px rgba(26,22,18,0.06),0 1px 2px rgba(26,22,18,0.04);
  --shadow-lg:0 10px 40px rgba(26,22,18,0.1);--radius:8px;--radius-lg:12px;
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-serif:'Noto Serif SC',Georgia,serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input{font-family:inherit}

/* 骨架屏加载动画 */
.skeleton{position:relative;overflow:hidden;background:#E8E0D8;border-radius:var(--radius)}
.skeleton::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* 加载遮罩 */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s,visibility 0.5s}
.loading-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-pulse{width:60px;height:60px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(0.8);opacity:0.5}50%{transform:scale(1.1);opacity:1}}
.loading-text{margin-top:20px;color:var(--text-secondary);font-size:14px;font-family:var(--font-serif)}

/* Toast 通知 */
.toast-container{position:fixed;top:80px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#fff;pointer-events:auto;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;max-width:360px;box-shadow:var(--shadow-lg)}
.toast.error{background:#E53935}
.toast.success{background:#43A047}
.toast.warning{background:#FB8C00}
.toast.info{background:#1E88E5}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* 顶部导航 */
.header{position:sticky;top:0;z-index:100;background:rgba(245,240,235,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--font-serif);font-weight:700;font-size:20px;color:var(--text);white-space:nowrap}
.logo svg{width:28px;height:28px}
.search-box{flex:1;min-width:200px;max-width:400px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:20px;background:var(--card);font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-tertiary)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.2s}
.btn-icon:hover{background:var(--accent-bg);color:var(--accent)}
.btn-icon svg{width:20px;height:20px}
.btn-leaderboard{padding:6px 14px;border-radius:20px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px;transition:all 0.2s}
.btn-leaderboard:hover{background:var(--accent-light)}
.btn-leaderboard svg{width:16px;height:16px}

/* 品牌栏 */
.brand-bar{text-align:center;padding:4px 20px;font-size:11px;color:var(--text-tertiary);background:var(--card);border-bottom:1px solid var(--border)}

/* 状态栏 */
.status-bar{background:var(--card);border-bottom:1px solid var(--border);padding:6px 20px;font-size:12px;color:var(--text-tertiary);display:flex;align-items:center;gap:16px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.green{background:#4CAF50}
.status-dot.yellow{background:#FF9800}
.status-dot.red{background:#F44336}
.user-info{display:flex;align-items:center;gap:6px;margin-left:auto}
.user-info img{width:18px;height:18px;border-radius:50%}

/* 数据源筛选 */
.source-filter{max-width:1200px;margin:12px auto 0;padding:0 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.source-filter::-webkit-scrollbar{display:none}
.sf-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid var(--border);color:var(--text-secondary);background:var(--card);transition:all 0.2s}
.sf-btn:hover{border-color:var(--accent);color:var(--accent)}
.sf-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 分类栏 */
.categories{max-width:1200px;margin:8px auto 0;padding:0 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.categories::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;border:1px solid var(--border);color:var(--text-secondary);background:var(--card);transition:all 0.2s}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 主内容网格 */
.main{max-width:1200px;margin:16px auto;padding:0 20px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}

/* 卡片 */
.card{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;transition:all 0.3s;cursor:pointer;border:1px solid transparent}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--border)}
.card-header{padding:16px 16px 0;display:flex;align-items:flex-start;gap:10px}
.card-source{flex-shrink:0;width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.card-source.github{background:#24292e}
.card-source.hackernews{background:#FF6600}
.card-source.arxiv{background:#B31B1B}
.card-source.producthunt{background:#DA552F}
.card-source.myrepo{background:#58a6ff}
.card-body{padding:12px 16px 16px;flex:1;min-width:0}
.card-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-tertiary);flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:3px}
.card-meta svg{width:14px;height:14px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;background:var(--accent-bg);color:var(--accent);font-weight:500}
.card-footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-actions{display:flex;gap:4px}
.card-action-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);transition:all 0.2s}
.card-action-btn:hover{background:var(--accent-bg);color:var(--accent)}
.card-action-btn.favorited{color:var(--accent)}
.card-action-btn svg{width:16px;height:16px}
.card-score{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:10px}

/* 骨架屏卡片 */
.skeleton-card{background:var(--card);border-radius:var(--radius-lg);padding:16px}
.skeleton-card .skeleton{height:14px;margin-bottom:10px;border-radius:4px}
.skeleton-card .skeleton.title{height:18px;width:80%;margin-bottom:12px}
.skeleton-card .skeleton.desc{height:12px;width:100%}
.skeleton-card .skeleton.desc2{height:12px;width:60%}
.skeleton-card .skeleton.meta{height:10px;width:40%;margin-top:14px}

/* 加载更多 */
.load-more-sentinel{height:1px;width:100%}
.load-more-indicator{text-align:center;padding:20px;color:var(--text-tertiary);font-size:13px}

/* 底部弹出详情面板 */
.bottom-sheet-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,22,18,0.4);z-index:200;opacity:0;visibility:hidden;transition:all 0.3s}
.bottom-sheet-overlay.active{opacity:1;visibility:visible}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;z-index:201;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:85vh;overflow-y:auto}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto}
.bottom-sheet-content{padding:0 20px 30px}
.bs-source{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;margin-bottom:12px}
.bs-title{font-family:var(--font-serif);font-size:22px;font-weight:700;line-height:1.4;margin-bottom:12px}
.bs-desc{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px}
.bs-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.bs-stat{background:var(--bg);padding:10px 12px;border-radius:var(--radius)}
.bs-stat-label{font-size:11px;color:var(--text-tertiary);margin-bottom:2px}
.bs-stat-value{font-size:16px;font-weight:600;color:var(--text)}
.bs-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.bs-actions{display:flex;gap:10px;margin-top:16px}
.bs-btn{flex:1;padding:10px;border-radius:var(--radius);font-size:14px;font-weight:500;text-align:center;transition:all 0.2s}
.bs-btn-primary{background:var(--accent);color:#fff}
.bs-btn-primary:hover{background:var(--accent-light)}
.bs-btn-secondary{border:1px solid var(--border);color:var(--text-secondary)}
.bs-btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* README 渲染区域 */
.bs-readme{margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.bs-readme-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.bs-readme-content{font-size:13px;line-height:1.7;color:var(--text-secondary);overflow-x:auto}
.bs-readme-content h1,.bs-readme-content h2,.bs-readme-content h3{color:var(--text);margin:16px 0 8px;font-weight:600}
.bs-readme-content h1{font-size:20px}
.bs-readme-content h2{font-size:17px}
.bs-readme-content h3{font-size:15px}
.bs-readme-content p{margin-bottom:10px}
.bs-readme-content ul,.bs-readme-content ol{padding-left:20px;margin-bottom:10px}
.bs-readme-content li{margin-bottom:4px}
.bs-readme-content code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px}
.bs-readme-content pre{background:#f6f8fa;border-radius:var(--radius);padding:14px;overflow-x:auto;margin-bottom:12px}
.bs-readme-content pre code{background:none;padding:0}
.bs-readme-content a{color:var(--accent)}
.bs-readme-content img{max-width:100%;border-radius:var(--radius)}
.bs-readme-content table{border-collapse:collapse;width:100%;margin-bottom:12px}
.bs-readme-content th,.bs-readme-content td{border:1px solid var(--border);padding:6px 10px;font-size:12px}
.bs-readme-content th{background:var(--bg);font-weight:600}
.bs-readme-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-tertiary);margin-bottom:10px}
.bs-readme-loading{display:flex;align-items:center;gap:8px;color:var(--text-tertiary);font-size:13px;margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.bs-readme-loading .skeleton{height:14px;flex:1;border-radius:4px}

/* 评分条 */
.score-bar-container{margin-bottom:12px}
.score-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.score-bar-label{font-size:11px;color:var(--text-tertiary);width:52px;text-align:right;flex-shrink:0}
.score-bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.score-bar-val{font-size:11px;font-weight:600;color:var(--text-secondary);width:24px;text-align:right;flex-shrink:0}

/* 排行榜弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,22,18,0.5);z-index:300;opacity:0;visibility:hidden;transition:all 0.3s;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:600px;max-height:80vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.3s}
.modal-overlay.active .modal{transform:scale(1)}
.modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-serif);font-size:20px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);transition:all 0.2s}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:16px 20px 20px}
.lb-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.lb-item:last-child{border-bottom:none}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.lb-rank.gold{background:#FFD700;color:#7B6B00}
.lb-rank.silver{background:#C0C0C0;color:#555}
.lb-rank.bronze{background:#CD7F32;color:#fff}
.lb-rank.normal{background:var(--bg);color:var(--text-tertiary)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-source{font-size:11px;color:var(--text-tertiary)}
.lb-score{font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0}
.lb-score-bars{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:4px}
.lb-dim{font-size:10px;color:var(--text-tertiary);text-align:center}
.lb-dim-val{font-weight:600;color:var(--text-secondary)}

/* 设置弹窗 */
.settings-modal .modal{max-width:480px}
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.settings-section p{font-size:12px;color:var(--text-tertiary);margin-bottom:8px;line-height:1.5}
.settings-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
.settings-input:focus{border-color:var(--accent)}
.settings-btn{padding:8px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;background:var(--accent);color:#fff;transition:all 0.2s}
.settings-btn:hover{background:var(--accent-light)}

/* 法律弹窗 */
.legal-modal .modal{max-width:560px}
.legal-content{font-size:13px;line-height:1.8;color:var(--text-secondary)}
.legal-content h4{font-size:15px;font-weight:600;color:var(--text);margin:16px 0 8px}
.legal-content p{margin-bottom:8px}
.legal-content ul{padding-left:20px;margin-bottom:8px}
.legal-content li{margin-bottom:4px}

/* 页脚 */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text-tertiary);border-top:1px solid var(--border);background:var(--card)}
.footer a{color:var(--accent);margin:0 8px;font-weight:500}
.footer-links{margin-bottom:6px}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:0.3}
.empty-state h3{font-family:var(--font-serif);font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.empty-state p{font-size:14px}

/* 滚动条 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* 响应式 */
@media(max-width:768px){
  .header{padding:10px 16px}
  .header-inner{gap:8px}
  .logo{font-size:18px}
  .logo span{display:none}
  .search-box{min-width:0;order:10;flex-basis:100%}
  .btn-leaderboard span{display:none}
  .source-filter{padding:0 16px}
  .categories{padding:0 16px}
  .main{padding:0 16px 100px}
  .grid{gap:12px}
  .status-bar{padding:6px 16px;font-size:11px}
  .toast-container{right:10px;left:10px}
  .toast{max-width:100%}
}

/* 动画 */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeInUp 0.4s ease both}
.card:nth-child(1){animation-delay:0.02s}
.card:nth-child(2){animation-delay:0.04s}
.card:nth-child(3){animation-delay:0.06s}
.card:nth-child(4){animation-delay:0.08s}
.card:nth-child(5){animation-delay:0.10s}
.card:nth-child(6){animation-delay:0.12s}
.card:nth-child(7){animation-delay:0.14s}
.card:nth-child(8){animation-delay:0.16s}
</style>
</head>
<body>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-pulse"></div>
  <div class="loading-text" data-i18n="loading">正在加载 AI 趋势数据...</div>
</div>

<!-- 顶部导航 -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="#C96442"/><path d="M18 4L10 18h5l-1 10 8-14h-5z" fill="#fff"/></svg>
      <span>AI Pulse</span>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="搜索项目、论文、产品...">

// ===================== 评分系统（确定性算法，无随机数） =====================
function computeScores(item) {
  const s = { innovation:0, impact:0, activity:0, quality:0, community:0, growth:0, practical:0, popularity:0 };
  const log10 = Math.log10;
  const min = Math.min;

  if (item.source === 'github' || item.source === 'myrepo') {
    const stars = item.stats.stars || 0;
    const forks = item.stats.forks || 0;
    const topicsCount = (item.tags || []).length;
    const hasDesc = (item.desc && item.desc.length > 10) ? 1 : 0;
    const descLen = (item.desc || '').length;
    const hasHomepage = item.homepage ? 1 : 0;
    const langCount = item.language ? 1 : 0;
    // 更新天数评分：越近越高
    const updatedDaysAgo = item.updated ? (Date.now() - new Date(item.updated).getTime()) / 86400000 : 365;
    const activityScore = min(100, Math.max(0, 100 - updatedDaysAgo * 0.5));
    const topicsRelevance = min(1, topicsCount / 10);
    const starsPerFork = stars > 0 ? min(100, (stars / Math.max(1, forks)) * 5) : 0;

    s.popularity = min(100, log10(stars + 1) * 20);
    s.community = min(100, log10(forks + 1) * 25);
    s.activity = activityScore;
    s.impact = min(100, log10(stars + 1) * 18);
    s.innovation = min(100, topicsCount * 12 + hasDesc * 20);
    s.quality = min(100, langCount * 15 + descLen / 10);
    s.growth = min(100, starsPerFork);
    s.practical = min(100, hasHomepage * 20 + topicsRelevance * 30);
  } else if (item.source === 'hackernews') {
    const pts = item.stats.points || 0;
    const comms = item.stats.comments || 0;
    const titleLen = (item.title || '').length;
    const titleQuality = min(100, titleLen * 2);
    const text = ((item.title || '') + ' ' + (item.desc || '')).toLowerCase();
    const kwMatch = CONFIG.AI_KEYWORDS.filter(kw => text.includes(kw)).length;
    const keywordMatch = min(100, kwMatch * 15);
    const recency = item.time ? min(100, Math.max(0, 100 - (Date.now() / 1000 - item.time) / 3600)) : 50;
    const domainQuality = item.url ? min(100, 40 + (item.url.startsWith('https://github.com') ? 30 : item.url.startsWith('https://arxiv.org') ? 25 : 15)) : 40;

    s.popularity = min(100, log10(pts + 1) * 22);
    s.community = min(100, log10(comms + 1) * 22);
    s.impact = min(100, log10(pts + 1) * 18);
    s.activity = min(100, comms * 2 + pts * 0.5);
    s.innovation = keywordMatch;
    s.quality = titleQuality;
    s.growth = recency;
    s.practical = domainQuality;
  } else if (item.source === 'arxiv') {
    const authorCount = (item.authors || []).length;
    const catCount = (item.tags || []).length;
    const abstractLen = (item.desc || '').length;
    const abstractScore = min(100, abstractLen / 5);
    const categories = item.tags || [];
    const catWeight = categories.some(c => c.includes('cs.AI')) ? 90 :
                      categories.some(c => c.includes('cs.CL')) ? 85 :
                      categories.some(c => c.includes('cs.LG')) ? 80 :
                      categories.some(c => c.includes('cs.CV')) ? 78 : 70;
    const text = ((item.title || '') + ' ' + (item.desc || '')).toLowerCase();
    const kwMatch = CONFIG.AI_KEYWORDS.filter(kw => text.includes(kw)).length;
    const keywordMatch = min(100, kwMatch * 12);
    const recency = item.published ? min(100, Math.max(0, 100 - (Date.now() - new Date(item.published).getTime()) / (7*86400000))) : 50;

    s.innovation = min(100, authorCount * 8 + catCount * 5);
    s.quality = abstractScore;
    s.impact = catWeight;
    s.popularity = 30;
    s.community = 20;
    s.activity = recency;
    s.growth = 30;
    s.practical = keywordMatch;
  } else if (item.source === 'producthunt') {
    const ups = item.stats.upvotes || 0;
    const descLen = (item.desc || '').length;
    const descScore = min(100, descLen / 2);

    s.popularity = min(100, log10(ups + 1) * 18);
    s.practical = 60;
    s.innovation = 50;
    s.impact = min(100, log10(ups + 1) * 15);
    s.quality = descScore;
    s.community = 30;
    s.activity = 40;
    s.growth = 35;
  }

  const total = Math.round(Object.values(s).reduce((a, b) => a + b, 0) / 8);
  item.scores = { ...s, total };
  return item;
}

// ===================== 缓存系统 =====================
function getCache(key) {
  try {
    const raw = localStorage.getItem('ai_pulse_cache_' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CONFIG.CACHE_TTL) return null;
    return data;
  } catch { return null; }
}
function setCache(key, data) {
  try {
    localStorage.setItem('ai_pulse_cache_' + key, JSON.stringify({ data, ts: Date.now() }));
  } catch {}
}
function clearAllCache() {
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('ai_pulse_cache_')) localStorage.removeItem(k);
  });
}

// ===================== README 缓存 =====================
function getReadmeCache(owner, repo) {
  try {
    const key = `readme_${owner}_${repo}`;
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CONFIG.README_CACHE_TTL) {
      localStorage.removeItem(key);
      return null;
    }
    return data;
  } catch { return null; }
}
function setReadmeCache(owner, repo, data) {
  try {
    const key = `readme_${owner}_${repo}`;
    localStorage.setItem(key, JSON.stringify({ data, ts: Date.now() }));
  } catch {}
}

// ===================== API: GitHub 搜索 =====================
async function fetchGitHub() {
  const cache = getCache('github');
  if (cache) { state.loading.github = false; updateStatus('github', 'green'); return cache; }

  const token = getGitHubToken();
  const allItems = [];
  const perPage = CONFIG.GITHUB_PER_PAGE;
  const seen = new Set();

  if (!token) {
    showToast(state.lang === 'zh' ? '未设置 GitHub Token，可能触发 API 限流。请在设置中添加 Token。' : 'No GitHub Token set. May hit rate limits. Please add a token in Settings.', 'warning');
  }

  for (const q of CONFIG.GITHUB_QUERIES) {
    try {
      const fullQuery = `${q} ${CONFIG.GITHUB_TIME_FILTER}`;
      const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(fullQuery)}&sort=stars&order=desc&per_page=${perPage}`;
      const headers = { 'Accept': 'application/vnd.github.v3+json' };
      if (token) headers['Authorization'] = `token ${token}`;
      const res = await fetch(url, { headers });
      if (!res.ok) {
        if (res.status === 403) {
          state.errors.github = state.lang === 'zh' ? 'API 限流，请设置 GitHub Token' : 'Rate limited, please set GitHub Token';
          showToast(t('error_github') + ': ' + state.errors.github, 'error');
        }
        continue;
      }
      const data = await res.json();
      if (data.items) {
        for (const repo of data.items) {
          if (seen.has(repo.id)) continue;
          seen.add(repo.id);
          allItems.push({
            id: 'gh_' + repo.id,
            source: 'github',
            title: repo.full_name,
            desc: repo.description || '',
            url: repo.html_url,
            tags: (repo.topics || []).slice(0, 5),
            category: '',
            stats: { stars: repo.stargazers_count, forks: repo.forks_count },
            language: repo.language,
            updated: repo.updated_at,
            created: repo.created_at,
            avatar: repo.owner?.avatar_url,
            homepage: repo.homepage || '',
            license: repo.license?.name || '',
            open_issues: repo.open_issues_count || 0,
            // README 相关字段
            repo_owner: repo.owner?.login,
            repo_name: repo.name
          });
        }
      }
    } catch (e) {
      console.error('GitHub 搜索出错:', q, e);
    }
  }

  state.loading.github = false;
  if (allItems.length === 0 && !state.errors.github) {
    state.errors.github = t('error_github');
  }
  updateStatus('github', allItems.length > 0 ? 'green' : 'red');
  setCache('github', allItems);
  return allItems;
}

  try {
    // 先获取用户信息
    if (!state.githubUser) {
      const userRes = await fetch('https://api.github.com/user', {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (userRes.ok) {
        const userData = await userRes.json();
        state.githubUser = {
          login: userData.login,
          avatar_url: userData.avatar_url,
          name: userData.name,
          public_repos: userData.public_repos
        };
        localStorage.setItem('ai_pulse_github_user', JSON.stringify(state.githubUser));
        renderUserInfo();
      }
    }

    // 获取用户仓库
    const login = state.githubUser?.login;
    if (!login) return [];

    const url = `https://api.github.com/users/${login}/repos?sort=updated&per_page=30&type=owner`;
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });

    if (!res.ok) {
      state.errors.myrepo = t('error_myrepo');
      showToast(t('error_myrepo'), 'error');
      return [];
    }

    const repos = await res.json();
    for (const repo of repos) {
      allItems.push({
        id: 'myrepo_' + repo.id,
        source: 'myrepo',
        title: repo.full_name,
        desc: repo.description || '',
        url: repo.html_url,
        tags: (repo.topics || []).slice(0, 5),
        category: 'myrepo',
        stats: { stars: repo.stargazers_count, forks: repo.forks_count },
        language: repo.language,
        updated: repo.updated_at,
        created: repo.created_at,
        avatar: repo.owner?.avatar_url,
        homepage: repo.homepage || '',
        license: repo.license?.name || '',
        open_issues: repo.open_issues_count || 0,
        repo_owner: repo.owner?.login,
        repo_name: repo.name
      });
    }
  } catch (e) {
    console.error('用户仓库加载出错:', e);
    state.errors.myrepo = e.message;
  }

  state.loading.myrepo = false;
  updateStatus('myrepo', allItems.length > 0 ? 'green' : 'yellow');
  setCache('myrepo', allItems);
  return allItems;
}

// ===================== API: HackerNews =====================
async function fetchHackerNews() {
  const cache = getCache('hn');
  if (cache) { state.loading.hn = false; updateStatus('hn', 'green'); return cache; }

  const allItems = [];

  async function getStories(type, count) {
    try {
      const idsRes = await fetch(`https://hacker-news.firebaseio.com/v0/${type}stories.json`);
      if (!idsRes.ok) return [];
      const ids = await idsRes.json();
      const topIds = ids.slice(0, count);

      const stories = await Promise.all(
        topIds.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.ok ? r.json() : null))
      );

      return stories.filter(Boolean).filter(s => {
        const text = ((s.title || '') + ' ' + (s.url || '')).toLowerCase();
        return CONFIG.AI_KEYWORDS.some(kw => text.includes(kw));
      });
    } catch { return []; }
  }

  try {
    // 4种故事类型：top 30 + show 20 + new 15 + best 15
    const [topStories, showStories, newStories, bestStories] = await Promise.all([
      getStories('top', CONFIG.HN_TOP_COUNT),
      getStories('show', CONFIG.HN_SHOW_COUNT),
      getStories('new', CONFIG.HN_NEW_COUNT),
      getStories('best', CONFIG.HN_BEST_COUNT)
    ]);

    const seen = new Set();
    for (const s of [...topStories, ...showStories, ...newStories, ...bestStories]) {
      if (seen.has(s.id)) continue;
      seen.add(s.id);
      allItems.push({
        id: 'hn_' + s.id,
        source: 'hackernews',
        title: s.title || '',
        desc: '',
        url: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
        tags: [],
        category: '',
        stats: { points: s.score || 0, comments: s.descendants || 0 },
        by: s.by,
        time: s.time,
        hn_id: s.id
      });
    }
  } catch (e) {
    console.error('HackerNews 加载出错:', e);
    state.errors.hn = e.message;
  }

  state.loading.hn = false;
  updateStatus('hn', allItems.length > 0 ? 'green' : (state.errors.hn ? 'red' : 'yellow'));
  setCache('hn', allItems);
  return allItems;
}

// ===================== API: ArXiv（带代理回退） =====================
async function fetchArXiv() {
  const cache = getCache('arxiv');
  if (cache) { state.loading.arxiv = false; updateStatus('arxiv', 'green'); return cache; }

  const query = encodeURIComponent(CONFIG.ARXIV_QUERY);
  const arxivUrl = `https://export.arxiv.org/api/query?search_query=${query}&sortBy=submittedDate&sortOrder=descending&max_results=${CONFIG.ARXIV_COUNT}`;

  let lastError = null;
  for (const proxy of CONFIG.ARXIV_PROXIES) {
    try {
      const proxyUrl = proxy + encodeURIComponent(arxivUrl);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(15000) });
      if (!res.ok) { lastError = new Error(`Proxy ${proxy} returned ${res.status}`); continue; }
      const text = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const entries = xml.querySelectorAll('entry');

      if (entries.length === 0) { lastError = new Error('No entries from proxy'); continue; }

      const items = [];
      entries.forEach(entry => {
        const id = entry.querySelector('id')?.textContent || '';
        const title = (entry.querySelector('title')?.textContent || '').replace(/\s+/g, ' ').trim();
        const summary = (entry.querySelector('summary')?.textContent || '').replace(/\s+/g, ' ').trim();
        const authors = Array.from(entry.querySelectorAll('author name')).map(a => a.textContent);
        const published = entry.querySelector('published')?.textContent || '';
        const categories = Array.from(entry.querySelectorAll('category')).map(c => c.getAttribute('term'));
        const pdfLink = entry.querySelector('link[title="pdf"]')?.href || '';
        const absLink = id;

        items.push({
          id: 'arxiv_' + id.split('/').pop(),
          source: 'arxiv',
          title: title,
          desc: summary.slice(0, 300),
          // 完整摘要保存在单独字段
          fullAbstract: summary,
          url: pdfLink || absLink,
          absUrl: absLink,
          tags: categories.slice(0, 5),
          category: '',
          stats: { citations: 0 },
          authors: authors,
          published: published,
          pdfLink: pdfLink
        });
      });

      state.loading.arxiv = false;
      updateStatus('arxiv', items.length > 0 ? 'green' : 'red');
      setCache('arxiv', items);
      return items;
    } catch (e) {
      lastError = e;
      console.warn('ArXiv 代理失败:', proxy, e.message);
    }
  }

  console.error('所有 ArXiv 代理均失败:', lastError);
  state.loading.arxiv = false;
  state.errors.arxiv = lastError ? lastError.message : t('error_arxiv');
  updateStatus('arxiv', 'red');
  showToast(t('error_arxiv') + ': ' + (lastError ? lastError.message : ''), 'error');
  return [];
}

// ===================== API: ProductHunt（尝试实时获取，回退到预设） =====================
async function fetchProductHunt() {
  const cache = getCache('ph');
  if (cache) { state.loading.ph = false; updateStatus('ph', 'green'); return cache; }

  // 尝试通过 CORS 代理获取 ProductHunt 实时数据
  const phProxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  const phUrl = 'https://www.producthunt.com/topics/artificial-intelligence';

  let realItems = null;
  for (const proxy of phProxies) {
    try {
      const proxyUrl = proxy + encodeURIComponent(phUrl);
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const html = await res.text();

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // 尝试从 JSON-LD 提取
      const jsonLd = doc.querySelectorAll('script[type="application/ld+json"]');
      let products = [];
      for (const script of jsonLd) {
        try {
          const data = JSON.parse(script.textContent);
          if (data['@type'] === 'ItemList' && data.itemListElement) {
            products = data.itemListElement.map(el => ({
              name: el.name || '',
              desc: el.description || '',
              url: el.url || '',
              upvotes: 0
            }));
          }
        } catch {}
      }

      // 回退：从 HTML 结构提取
      if (products.length === 0) {
        const productCards = doc.querySelectorAll('[data-test="post-item"], .post-item, [class*="PostCard"], [class*="post-card"]');
        productCards.forEach(card => {
          const nameEl = card.querySelector('h3, h2, [class*="title"], [class*="name"]');
          const descEl = card.querySelector('p, [class*="tagline"], [class*="description"]');
          const linkEl = card.querySelector('a[href]');
          if (nameEl) {
            products.push({
              name: nameEl.textContent.trim(),
              desc: descEl ? descEl.textContent.trim() : '',
              url: linkEl ? linkEl.href : '',
              upvotes: 0
            });
          }
        });
      }

      if (products.length > 0) {
        realItems = products.filter(p => p.name).slice(0, 20).map((p, i) => ({
          id: 'ph_real_' + i,
          source: 'producthunt',
          title: p.name,
          desc: p.desc || '',
          url: p.url || '#',
          tags: ['AI'],
          category: '',
          stats: { upvotes: p.upvotes || 0 }
        }));
        break;
      }
    } catch (e) {
      console.warn('ProductHunt 代理失败:', e.message);
    }
  }

  if (realItems && realItems.length > 0) {
    showToast(t('ph_fetch_success'), 'success');
    state.loading.ph = false;
    updateStatus('ph', 'green');
    setCache('ph', realItems);
    return realItems;
  }

  // 回退到预设数据
  showToast(t('ph_fetch_failed'), 'warning');
  const items = PH_PRESETS.map((p, i) => ({
    id: 'ph_' + i,
    source: 'producthunt',
    title: p.name,
    desc: state.lang === 'zh' && p.desc_zh ? p.desc_zh : p.desc,
    url: p.url,
    tags: p.tags,
    category: p.category,
    stats: { upvotes: p.upvotes }
  }));

  state.loading.ph = false;
  updateStatus('ph', 'green');
  setCache('ph', items);
  return items;
}

// ===================== API: 获取 README =====================
async function fetchReadme(owner, repo) {
  // 检查缓存
  const cached = getReadmeCache(owner, repo);
  if (cached !== null) return cached;

  const token = getGitHubToken();
  const headers = { 'Accept': 'application/vnd.github.raw+json' };
  if (token) headers['Authorization'] = `token ${token}`;

  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/readme`;
    const res = await fetch(url, { headers });
    if (!res.ok) return null;
    const markdown = await res.text();
    // 缓存 README
    setReadmeCache(owner, repo, markdown);
    return markdown;
  } catch (e) {
    console.error('README 获取失败:', e);
    return null;
  }
}

// ===================== 渲染 README 为 HTML =====================
function renderReadmeHtml(markdown) {
  if (!markdown) return '';
  try {
    // 配置 marked
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        highlight: function(code, lang) {
          if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; } catch {}
          }
          if (typeof hljs !== 'undefined') {
            try { return hljs.highlightAuto(code).value; } catch {}
          }
          return code;
        },
        breaks: true,
        gfm: true
      });
      return marked.parse(markdown);
    }
    return '<pre>' + escHtml(markdown) + '</pre>';
  } catch (e) {
    return '<pre>' + escHtml(markdown) + '</pre>';
  }
}

// ===================== 渲染卡片 =====================
function getSourceLabel(source) {
  if (source === 'myrepo') return t('source_myrepo');
  return t('source_' + source);
}

function getSourceClass(source) {
  return source === 'hackernews' ? 'hackernews' : source === 'myrepo' ? 'myrepo' : source;
}

function getSourceLetter(source) {
  const map = { github: 'G', hackernews: 'Y', arxiv: 'A', producthunt: 'P', myrepo: 'M' };
  return map[source] || '?';
}

function getStatLabel(item) {
  if (item.source === 'github' || item.source === 'myrepo') return `${(item.stats.stars || 0).toLocaleString()} ${t('stars')} · ${(item.stats.forks || 0).toLocaleString()} ${t('forks')}`;
  if (item.source === 'hackernews') return `${(item.stats.points || 0)} ${t('points')} · ${(item.stats.comments || 0)} ${t('comments')}`;
  if (item.source === 'arxiv') return item.authors ? item.authors.slice(0, 2).join(', ') + (item.authors.length > 2 ? '...' : '') : '';
  if (item.source === 'producthunt') return `${(item.stats.upvotes || 0).toLocaleString()} ${t('upvotes')}`;
  return '';
}

function isFavorited(id) {
  return state.favorites.includes(id);
}

function toggleFavorite(id) {
  if (isFavorited(id)) {
    state.favorites = state.favorites.filter(f => f !== id);
  } else {
    state.favorites.push(id);
  }
  localStorage.setItem('ai_pulse_favs', JSON.stringify(state.favorites));
  renderCards();
  if (document.getElementById('bottomSheet').classList.contains('active')) {
    const item = state.items.find(i => i.id === id);
    if (item) openBottomSheet(item);
  }
}

function renderSkeletons(count = 8) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = Array(count).fill(`
    <div class="skeleton-card">
      <div class="skeleton title"></div>
      <div class="skeleton desc"></div>
      <div class="skeleton desc2"></div>
      <div class="skeleton meta"></div>
    </div>
  `).join('');
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  const items = state.filteredItems;
  const toShow = items.slice(0, state.displayedCount);

  if (items.length === 0 && !state.loading.github && !state.loading.hn && !state.loading.arxiv && !state.loading.ph) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  if (items.length === 0 && (state.loading.github || state.loading.hn || state.loading.arxiv || state.loading.ph)) {
    return;
  }

  empty.style.display = 'none';
  grid.innerHTML = toShow.map(item => {
    const fav = isFavorited(item.id);
    const catLabel = item.category ? t('cat_' + item.category) : '';
    return `
    <div class="card" data-id="${item.id}">
      <div class="card-header">
        <div class="card-source ${getSourceClass(item.source)}">${getSourceLetter(item.source)}</div>
        <div class="card-body">
          <div class="card-title">${escHtml(item.title)}</div>
          <div class="card-desc">${escHtml(item.desc)}</div>
          <div class="card-tags">
            ${(item.tags || []).slice(0, 3).map(tag => `<span class="tag">${escHtml(translateTag(tag))}</span>`).join('')}
            ${catLabel ? `<span class="tag">${catLabel}</span>` : ''}
          </div>
          <div class="card-meta">
            <span>${getStatLabel(item)}</span>
            <span style="margin-left:auto">${timeAgo(item)}</span>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="card-score">${item.scores ? item.scores.total : '—'}</div>
        <div class="card-actions">
          <button class="card-action-btn ${fav ? 'favorited' : ''}" data-fav="${item.id}" title="${fav ? t('remove_favorite') : t('add_favorite')}">
            <svg viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <a class="card-action-btn" href="${escHtml(item.url)}" target="_blank" rel="noopener" title="${t('open_link')}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </div>
      </div>
    </div>`;
  }).join('');

  // 更新加载更多状态
  state.allLoaded = state.displayedCount >= items.length;
  const indicator = document.getElementById('loadMoreIndicator');
  if (state.allLoaded && items.length > 0) {
    indicator.style.display = 'block';
    indicator.textContent = t('no_more');
  } else {
    indicator.style.display = 'none';
  }

  // 绑定事件
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-action-btn')) return;
      const item = state.items.find(i => i.id === card.dataset.id);
      if (item) openBottomSheet(item);
    });
  });
  grid.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite(btn.dataset.fav);
    });
  });
}

// ===================== 无限滚动 =====================
function setupInfiniteScroll() {
  const sentinel = document.getElementById('loadMoreSentinel');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !state.allLoaded) {
        loadMore();
      }
    });
  }, { rootMargin: '200px' });
  observer.observe(sentinel);
}

function loadMore() {
  if (state.allLoaded) return;
  const indicator = document.getElementById('loadMoreIndicator');
  indicator.style.display = 'block';
  indicator.textContent = t('loading_more');
  setTimeout(() => {
    state.displayedCount += CONFIG.LOAD_MORE_COUNT;
    renderCards();
  }, 300);
}

      <div class="bs-stat"><div class="bs-stat-label">${t('author')}</div><div class="bs-stat-value">${item.by || '—'}</div></div>
      <div class="bs-stat"><div class="bs-stat-label">${t('total_score')}</div><div class="bs-stat-value" style="color:var(--accent)">${item.scores ? item.scores.total : '—'}</div></div>
    `;
    extraInfoHtml = `
      <div style="margin-bottom:12px;font-size:12px;color:var(--text-secondary)">
        <strong>${t('hn_discussion')}:</strong> <a href="https://news.ycombinator.com/item?id=${item.hn_id}" target="_blank" rel="noopener">HackerNews</a>
      </div>
    `;
  } else if (item.source === 'arxiv') {
    // ArXiv 论文详情
    statsHtml = `
      <div class="bs-stat"><div class="bs-stat-label">${t('published')}</div><div class="bs-stat-value">${item.published ? new Date(item.published).toLocaleDateString() : '—'}</div></div>
      <div class="bs-stat"><div class="bs-stat-label">${t('total_score')}</div><div class="bs-stat-value" style="color:var(--accent)">${item.scores ? item.scores.total : '—'}</div></div>
    `;
    extraInfoHtml = `
      <div style="margin-bottom:12px;font-size:12px">
        <strong>${t('authors')}:</strong> ${(item.authors || []).join(', ')}
      </div>
      ${(item.tags && item.tags.length > 0) ? `<div style="margin-bottom:12px;font-size:12px"><strong>${t('category')}:</strong> ${item.tags.map(c => `<span class="tag" style="margin-left:4px">${escHtml(c)}</span>`).join('')}</div>` : ''}
      <div style="margin-bottom:12px;font-size:13px">
        <strong>${t('abstract')}:</strong>
        <div style="margin-top:6px;line-height:1.7;color:var(--text-secondary)">${escHtml(item.fullAbstract || item.desc)}</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        ${item.pdfLink ? `<a class="bs-btn bs-btn-primary" href="${escHtml(item.pdfLink)}" target="_blank" rel="noopener" style="flex:none;padding:6px 14px;font-size:12px">${t('view_pdf')}</a>` : ''}
        ${item.absUrl ? `<a class="bs-btn bs-btn-secondary" href="${escHtml(item.absUrl)}" target="_blank" rel="noopener" style="flex:none;padding:6px 14px;font-size:12px">ArXiv</a>` : ''}
      </div>
    `;
  } else {
    // ProductHunt 详情
    statsHtml = `
      <div class="bs-stat"><div class="bs-stat-label">${t('upvotes')}</div><div class="bs-stat-value">${(item.stats.upvotes || 0).toLocaleString()}</div></div>
      <div class="bs-stat"><div class="bs-stat-label">${t('total_score')}</div><div class="bs-stat-value" style="color:var(--accent)">${item.scores ? item.scores.total : '—'}</div></div>
    `;
  }

  content.innerHTML = `
    <div class="bs-source card-source ${getSourceClass(item.source)}">${getSourceLabel(item.source)}</div>
    <div class="bs-title">${escHtml(item.title)}</div>
    <div class="bs-desc">${escHtml(item.desc)}</div>
    <div class="bs-tags">
      ${(item.tags || []).slice(0, 5).map(tag => `<span class="tag">${escHtml(translateTag(tag))}</span>`).join('')}
      ${item.category && item.category !== 'myrepo' ? `<span class="tag">${t('cat_' + item.category)}</span>` : ''}
    </div>
    <div class="bs-stats">${statsHtml}</div>
    ${extraInfoHtml}
    ${readmeHtml}
    ${scoreDims.length > 0 ? `
      <div class="score-bar-container">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-secondary)">${t('leaderboard_title')}</div>
        ${scoreDims.map(d => `
          <div class="score-bar-row">
            <div class="score-bar-label">${d.label}</div>
            <div class="score-bar-track">
              <div class="score-bar-fill" style="width:${item.scores[d.key]}%;background:${scoreBarColor(item.scores[d.key])}"></div>
            </div>
            <div class="score-bar-val">${item.scores[d.key]}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div class="bs-actions">
      <a class="bs-btn bs-btn-primary" href="${escHtml(item.url)}" target="_blank" rel="noopener">${t('open_link')}</a>
      <button class="bs-btn bs-btn-secondary" id="bsFavBtn" data-id="${item.id}">${fav ? t('remove_favorite') : t('add_favorite')}</button>
      <button class="bs-btn bs-btn-secondary" id="bsCopyBtn" data-url="${escHtml(item.url)}">${t('copy_link')}</button>
    </div>
  `;

  overlay.classList.add('active');
  sheet.classList.add('active');

  // 收藏按钮
  document.getElementById('bsFavBtn')?.addEventListener('click', () => {
    toggleFavorite(item.id);
  });

  // 复制链接按钮
  document.getElementById('bsCopyBtn')?.addEventListener('click', function() {
    navigator.clipboard?.writeText(this.dataset.url);
    this.textContent = t('copied');
    setTimeout(() => { this.textContent = t('copy_link'); }, 1500);
  });

  // 异步加载 README（仅 GitHub 和用户仓库）
  if ((item.source === 'github' || item.source === 'myrepo') && item.repo_owner && item.repo_name) {
    loadReadmeAsync(item.repo_owner, item.repo_name);
  }
}

// 异步加载 README
async function loadReadmeAsync(owner, repo) {
  const area = document.getElementById('bsReadmeArea');
  if (!area) return;

  try {
    const markdown = await fetchReadme(owner, repo);
    if (markdown) {
      const html = renderReadmeHtml(markdown);
      area.innerHTML = `
        <div class="bs-readme">
          <div class="bs-readme-title">${t('readme_title')}</div>
          <div class="bs-readme-content">${html}</div>
        </div>
      `;
      // 代码高亮
      if (typeof hljs !== 'undefined') {
        area.querySelectorAll('pre code').forEach(block => {
          try { hljs.highlightElement(block); } catch {}
        });
      }
    } else {
      area.innerHTML = `
        <div class="bs-readme">
          <div class="bs-readme-title">${t('readme_title')}</div>
          <div style="font-size:13px;color:var(--text-tertiary);padding:12px 0">${t('readme_empty')}</div>
        </div>
      `;
    }
  } catch (e) {
    area.innerHTML = `
      <div class="bs-readme">
        <div class="bs-readme-title">${t('readme_title')}</div>
        <div style="font-size:13px;color:var(--text-tertiary);padding:12px 0">${t('readme_empty')}</div>
      </div>
    `;
  }
}

function closeBottomSheet() {
  document.getElementById('bsOverlay').classList.remove('active');
  document.getElementById('bottomSheet').classList.remove('active');
}

// ===================== 排行榜 =====================
function openLeaderboard() {
  const modal = document.getElementById('lbModal');
  const body = document.getElementById('lbBody');

  const sorted = [...state.items].filter(i => i.scores).sort((a, b) => b.scores.total - a.scores.total).slice(0, 20);

  body.innerHTML = sorted.map((item, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
    const dims = item.scores ? [
      { key: 'innovation', label: t('score_innovation') },
      { key: 'impact', label: t('score_impact') },
      { key: 'activity', label: t('score_activity') },
      { key: 'quality', label: t('score_quality') }
    ] : [];
    return `
    <div class="lb-item" data-id="${item.id}" style="cursor:pointer">
      <div class="lb-rank ${rankClass}">${i + 1}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(item.title)}</div>
        <div class="lb-source">${getSourceLabel(item.source)}</div>
        ${dims.length > 0 ? `
          <div class="lb-score-bars">
            ${dims.map(d => `<div class="lb-dim"><div style="font-size:9px;color:var(--text-tertiary)">${d.label}</div><div class="lb-dim-val">${item.scores[d.key]}</div></div>`).join('')}
          </div>
        ` : ''}
      </div>
      <div class="lb-score">${item.scores.total}</div>
    </div>`;
  }).join('');

  body.querySelectorAll('.lb-item').forEach(el => {
    el.addEventListener('click', () => {
      const item = state.items.find(i => i.id === el.dataset.id);
      if (item) {
        closeLeaderboard();
        setTimeout(() => openBottomSheet(item), 300);
      }
    });
  });

  modal.classList.add('active');
}

function closeLeaderboard() {
  document.getElementById('lbModal').classList.remove('active');
}

  input.value = getGitHubToken();
  updateTokenStatus();
  updateNextRefresh();

function updateTokenStatus() {
  const status = document.getElementById('tokenStatus');
  const token = getGitHubToken();
  if (token) {
    status.innerHTML = `<span style="color:#4CAF50">&#9679;</span> ${state.lang === 'zh' ? 'Token 已配置' : 'Token configured'} (${token.slice(0, 8)}...)`;
  } else {
    status.innerHTML = `<span style="color:#FF9800">&#9679;</span> ${state.lang === 'zh' ? '未配置 Token（可能触发限流）' : 'No token (may hit rate limits)'}`;
  }
}

async function saveToken() {
  const input = document.getElementById('githubTokenInput');
  const token = input.value.trim();
  if (token) {
    localStorage.setItem('ai_pulse_github_token', token);
    showToast(t('token_saved'), 'success');
    // 验证 Token 并获取用户信息
    try {
      const res = await fetch('https://api.github.com/user', {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (res.ok) {
        const user = await res.json();
        state.githubUser = {
          login: user.login,
          avatar_url: user.avatar_url,
          name: user.name,
          public_repos: user.public_repos
        };
        localStorage.setItem('ai_pulse_github_user', JSON.stringify(state.githubUser));
        renderUserInfo();
        document.getElementById('tokenStatus').innerHTML = `<span style="color:#4CAF50">&#9679;</span> ${t('token_test_ok')} (${user.login})`;
      } else {
        document.getElementById('tokenStatus').innerHTML = `<span style="color:#F44336">&#9679;</span> ${t('token_test_fail')} (${res.status})`;
      }
    } catch {
      document.getElementById('tokenStatus').innerHTML = `<span style="color:#FF9800">&#9679;</span> ${state.lang === 'zh' ? '无法验证 Token（网络问题）' : 'Cannot verify token (network issue)'}`;
    }
  } else {
    localStorage.removeItem('ai_pulse_github_token');
    localStorage.removeItem('ai_pulse_github_user');
    state.githubUser = null;
    renderUserInfo();
    showToast(t('token_cleared'), 'info');
    updateTokenStatus();
  }
}

function clearToken() {
  localStorage.removeItem('ai_pulse_github_token');
  localStorage.removeItem('ai_pulse_github_user');
  state.githubUser = null;
  renderUserInfo();
  document.getElementById('githubTokenInput').value = '';
  showToast(t('token_cleared'), 'info');
  updateTokenStatus();
}

// ===================== 筛选器 =====================
async function applyFilters() {
  let items = [...state.items];

  // "我的仓库"分类需要加载用户仓库
  if (state.activeCategory === 'myrepo') {
    const myRepos = await fetchMyRepos();
    // 将用户仓库合并到 items 中（如果还没有的话）
    const existingIds = new Set(items.filter(i => i.source === 'myrepo').map(i => i.id));
    for (const repo of myRepos) {
      if (!existingIds.has(repo.id)) {
        items.push(computeScores(repo));
      }
    }
    state.items = items;
    items = items.filter(i => i.source === 'myrepo');
  } else {
    // 数据源筛选
    if (state.activeSource !== 'all') {
      items = items.filter(i => i.source === state.activeSource);
    }
    // 分类筛选
    if (state.activeCategory !== 'all') {
      items = items.filter(i => i.category === state.activeCategory);
    }
  }

  // 收藏筛选
  if (state.showFavoritesOnly) {
    items = items.filter(i => isFavorited(i.id));
  }

  // 搜索筛选
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    items = items.filter(i => {
      const text = (i.title + ' ' + i.desc + ' ' + (i.tags || []).join(' ')).toLowerCase();
      return text.includes(q);
    });
  }

  // 按评分排序
  items.sort((a, b) => (b.scores?.total || 0) - (a.scores?.total || 0));

  state.filteredItems = items;
  renderCards();
}

// ===================== 工具函数 =====================
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeAgo(item) {
  let ts = null;
  if (item.time) ts = item.time * 1000;
  else if (item.updated) ts = new Date(item.updated).getTime();
  else if (item.published) ts = new Date(item.published).getTime();
  if (!ts) return '';

  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (state.lang === 'zh') {
    if (mins < 60) return `${mins}分钟前`;
    if (hours < 24) return `${hours}小时前`;
    if (days < 30) return `${days}天前`;
    return `${Math.floor(days / 30)}个月前`;
  } else {
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 30) return `${days}d ago`;
    return `${Math.floor(days / 30)}mo ago`;
  }
}

// ===================== 国际化更新 =====================
function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
  document.title = state.lang === 'zh' ? 'AI Pulse - AI 趋势雷达' : 'AI Pulse - AI Trend Radar';
  updateTotalCount();
}

// ===================== 自动刷新 =====================
function startAutoRefresh() {
  if (state.autoRefreshTimer) clearInterval(state.autoRefreshTimer);
  state.autoRefreshTimer = setInterval(() => {
    refreshData(true);
  }, CONFIG.AUTO_REFRESH_INTERVAL);

  // 每秒更新倒计时
  setInterval(updateNextRefresh, 1000);
}

async function refreshData(silent = false) {
  if (state.isRefreshing) return;
  state.isRefreshing = true;

  clearAllCache();
  state.loading = { github: true, hn: true, arxiv: true, ph: true, myrepo: false };
  state.errors = { github: null, hn: null, arxiv: null, ph: null, myrepo: null };
  state.displayedCount = CONFIG.INITIAL_DISPLAY;
  state.allLoaded = false;

  if (!silent) {
    renderSkeletons(8);
  }

  try {
    const [ghItems, hnItems, arxivItems, phItems] = await Promise.all([
      fetchGitHub(),
      fetchHackerNews(),
      fetchArXiv(),
      fetchProductHunt()
    ]);

    let allItems = [...ghItems, ...hnItems, ...arxivItems, ...phItems];
    allItems.forEach(item => {
      if (!item.category) item.category = classifyItem(item);
    });
    allItems = allItems.map(item => computeScores(item));

    // 去重
    const seen = new Set();
    allItems = allItems.filter(item => {
      const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 40);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    state.items = allItems;
    applyFilters();
    updateLastUpdate();
    updateTotalCount();

    if (!silent) {
      showToast(t('refresh_success'), 'success');
    }
  } catch (e) {
    console.error('刷新出错:', e);
    if (!silent) {
      showToast(t('refresh_fail'), 'error');
    }
  }

  state.isRefreshing = false;
}

// ===================== 初始化 =====================
async function init() {
  updateI18n();
  renderCategories();
  renderSourceFilter();
  renderSkeletons(8);
  renderUserInfo();

  // 并行获取所有数据源
  const [ghItems, hnItems, arxivItems, phItems] = await Promise.all([
    fetchGitHub(),
    fetchHackerNews(),
    fetchArXiv(),
    fetchProductHunt()
  ]);

  // 合并并处理
  let allItems = [...ghItems, ...hnItems, ...arxivItems, ...phItems];

  // 分类
  allItems.forEach(item => {
    if (!item.category) item.category = classifyItem(item);
  });

  // 计算评分
  allItems = allItems.map(item => computeScores(item));

  // 去重
  const seen = new Set();
  allItems = allItems.filter(item => {
    const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  state.items = allItems;
  applyFilters();
  updateLastUpdate();
  updateTotalCount();

  // 设置无限滚动
  setupInfiniteScroll();

  // 启动自动刷新
  startAutoRefresh();

  // 隐藏加载遮罩
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, 500);
}

// ===================== 事件监听 =====================
document.addEventListener('DOMContentLoaded', () => {
  init();

  // 搜索
  let searchTimeout;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      state.searchQuery = e.target.value.trim();
      state.showFavoritesOnly = false;
      state.displayedCount = CONFIG.INITIAL_DISPLAY;
      state.allLoaded = false;
      applyFilters();
    }, 300);
  });

  // 语言切换
  document.getElementById('btnLang').addEventListener('click', () => {
    state.lang = state.lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('ai_pulse_lang', state.lang);
    updateI18n();
    renderCategories();
    renderSourceFilter();
    applyFilters();
    updateLastUpdate();
  });

  // 收藏切换
  document.getElementById('btnFavorites').addEventListener('click', () => {
    state.showFavoritesOnly = !state.showFavoritesOnly;
    if (state.showFavoritesOnly) {
      state.activeCategory = 'all';
      renderCategories();
    }
    state.displayedCount = CONFIG.INITIAL_DISPLAY;
    state.allLoaded = false;
    applyFilters();
  });

  // 刷新按钮
  document.getElementById('btnRefresh').addEventListener('click', () => {
    refreshData(false);
  });

  // 设置
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('settingsClose').addEventListener('click', closeSettings);
  document.getElementById('settingsModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeSettings();
  });
  document.getElementById('saveTokenBtn').addEventListener('click', saveToken);
  document.getElementById('clearTokenBtn').addEventListener('click', clearToken);

  // 排行榜
  document.getElementById('btnLeaderboard').addEventListener('click', openLeaderboard);
  document.getElementById('lbClose').addEventListener('click', closeLeaderboard);
  document.getElementById('lbModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLeaderboard();
  });

  // 底部面板
  document.getElementById('bsOverlay').addEventListener('click', closeBottomSheet);

  // 法律页面
  document.getElementById('footerTerms').addEventListener('click', (e) => { e.preventDefault(); openLegal('terms'); });
  document.getElementById('footerPrivacy').addEventListener('click', (e) => { e.preventDefault(); openLegal('privacy'); });
  document.getElementById('footerAbout').addEventListener('click', (e) => { e.preventDefault(); openLegal('about'); });
  document.getElementById('legalClose').addEventListener('click', closeLegal);
  document.getElementById('legalModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLegal();
  });

  // 触摸支持
  let startY = 0;
  const sheet = document.getElementById('bottomSheet');
  sheet.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
  }, { passive: true });
  sheet.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - startY;
    if (dy > 80) closeBottomSheet();
  }, { passive: true });

  // 键盘快捷键
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeBottomSheet();
      closeLeaderboard();
      closeSettings();
      closeLegal();
    }
  });
});
